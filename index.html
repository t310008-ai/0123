<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的學習歷程數位檔案</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 0; background: #00a896; color: white; border-radius: 15px; margin-bottom: 30px; }
        
        /* 導覽按鈕 */
        .nav-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .nav-btn { padding: 12px 30px; border: none; border-radius: 25px; background: white; color: #00a896; 
                   font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: #028090; color: white; }

        /* 內容區塊 */
        .grade-section { display: none; animation: fadeIn 0.5s; }
        .grade-section.active { display: block; }

        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid #00a896; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: #333; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.8em; margin-bottom: 10px; }
        .tag-required { background: #e1f5fe; color: #0288d1; }
        .tag-elective { background: #fff3e0; color: #f57c00; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h1>學習歷程全紀錄</h1>
    <p>高一至高三 課程學習成果統整</p>
</div>

<div class="nav-container">
    <button class="nav-btn active" onclick="showGrade('g1')">高一時期</button>
    <button class="nav-btn" onclick="showGrade('g2')">高二時期</button>
    <button class="nav-btn" onclick="showGrade('g3')">高三時期</button>
</div>

<div id="g1" class="grade-section active">
    <div class="subject-grid">
        <div class="card">
            <span class="tag tag-required">部定必修</span>
            <h3>英文閱讀與寫作</h3>
            <p>重點：分析五篇英文短篇小說，並撰寫心智圖總結。</p>
            <a href="#">查看檔案內容 →</a>
        </div>
        <div class="card">
            <span class="tag tag-elective">校訂選修</span>
            <h3>程式設計入門</h3>
            <p>重點：學習 Python 基礎，獨立完成猜數字小遊戲。</p>
            <a href="#">查看檔案內容 →</a>
        </div>
    </div>
</div>

<div id="g2" class="grade-section">
    <div class="subject-grid">
        <div class="card">
            <span class="tag tag-required">部定必修</span>
            <h3>物理實驗</h3>
            <p>重點：自由落體實驗數據分析與誤差討論。</p>
            <a href="#">查看檔案內容 →</a>
        </div>
    </div>
</div>

<script>
    function showGrade(gradeId) {
        // 隱藏所有區塊
        document.querySelectorAll('.grade-section').forEach(sec => sec.classList.remove('active'));
        // 取消所有按鈕活性
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        
        // 顯示特定區塊與啟動按鈕
        document.getElementById(gradeId).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>

</body>
</html>
